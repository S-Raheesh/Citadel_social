
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITADEL | City Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans flex justify-center min-h-screen transition-theme matrix-bg">

    <div class="max-w-md w-full relative flex flex-col h-screen overflow-hidden border-x border-slate-200 dark:border-slate-800/60 shadow-2xl bg-white/30 dark:bg-slate-950/40">

        <header id="app-header" class="glass-panel px-4 py-3 flex justify-between items-center z-20 sticky top-0 cursor-pointer">
            <a href="dash-citizen.html" class="flex items-center gap-3 group">
                <div class="score-ring" style="--ring-p: 75; --ring-size: 2.6rem;">
                    <div class="ring-core">
                        <span id="mini-initial" class="text-xs font-black text-slate-700 dark:text-white">?</span>
                    </div>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tighter leading-none">
                        <span class="text-red-600 dark:text-red-500">CITY</span><span class="text-slate-900 dark:text-white">FEED</span>
                    </h1>
                    <p class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Live Civic Grid</p>
                </div>
            </a>
            <div class="flex items-center gap-2 bg-slate-100/80 dark:bg-slate-800/60 px-3 py-1.5 rounded-full border border-slate-200 dark:border-slate-700">
                <svg class="w-4 h-4 text-amber-500 drop-shadow-[0_0_6px_rgba(245,158,11,.6)]" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                <span id="credit-tally" class="text-sm font-black text-amber-500">450</span>
            </div>
        </header>

        <div id="feed-container" class="flex-1 overflow-y-auto px-3 py-4 space-y-5 pb-28"></div>

        <div id="ai-overlay" class="absolute inset-0 bg-slate-950/95 backdrop-blur-xl z-[1500] flex flex-col items-center justify-center hidden px-6 text-center animate-enter">
            <div class="relative w-24 h-24 mb-6">
                <div class="absolute inset-0 border-4 border-slate-800 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-red-500 border-t-transparent rounded-full animate-spin shadow-[0_0_15px_rgba(239,68,68,0.5)]"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"></path></svg>
                </div>
            </div>
            <p id="ai-status-text" class="text-white font-mono text-xs tracking-widest uppercase font-black leading-relaxed">Extracting Visual Data...</p>
            <div class="w-full max-w-[220px] h-1.5 bg-slate-800 rounded-full mt-6 overflow-hidden">
                <div id="ai-progress-bar" class="h-full bg-red-500 w-0 transition-all duration-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div>
            </div>
        </div>

        <button class="fab" onclick="openComposer()" aria-label="Report a new issue">
            <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path></svg>
        </button>

        <nav class="glass-panel absolute bottom-0 left-0 w-full px-10 pt-3 pb-3 flex justify-between items-center z-[900]">
            <a href="feed-citizen.html" class="flex flex-col items-center text-red-600 dark:text-red-500 transition-colors">
                <svg class="w-6 h-6 drop-shadow-[0_0_8px_rgba(239,68,68,0.4)]" fill="currentColor" viewBox="0 0 24 24"><path d="M11.47 3.84a.75.75 0 011.06 0l8.69 8.69a.75.75 0 101.06-1.06l-8.689-8.69a2.25 2.25 0 00-3.182 0l-8.69 8.69a.75.75 0 001.061 1.06l8.69-8.69z"></path><path d="M12 5.432l8.159 8.159c.03.03.06.058.091.086v6.198c0 1.035-.84 1.875-1.875 1.875H15a.75.75 0 01-.75-.75v-4.5a.75.75 0 00-.75-.75h-3a.75.75 0 00-.75.75V21a.75.75 0 01-.75.75H5.625a1.875 1.875 0 01-1.875-1.875v-6.198a2.29 2.29 0 00.091-.086L12 5.432z"></path></svg>
                <span class="text-[9px] font-black uppercase tracking-widest mt-1">Feed</span>
            </a>
            <a href="dash-citizen.html" class="flex flex-col items-center text-slate-500 hover:text-red-600 dark:text-slate-400 dark:hover:text-red-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="text-[9px] font-black uppercase tracking-widest mt-1">Profile</span>
            </a>
        </nav>

        <div id="composer-backdrop" class="sheet-backdrop" onclick="closeComposer()"></div>
        <div id="composer-sheet" class="sheet">
            <div class="sheet-handle"></div>
            <div class="px-5 pb-8">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-black tracking-tight">New Report</h2>
                    <button onclick="closeComposer()" class="p-1.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-red-500 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <div id="camera-container" class="relative rounded-2xl overflow-hidden bg-black border border-slate-300 dark:border-slate-700 aspect-square">
                    <video id="live-webcam" autoplay playsinline class="w-full h-full object-cover"></video>
                    <canvas id="snapshot-canvas" class="hidden w-full h-full object-cover"></canvas>

                    <div class="absolute inset-4 border border-white/40 rounded-xl pointer-events-none"></div>
                    <div class="absolute top-3 left-1/2 -translate-x-1/2 text-[9px] font-mono tracking-widest text-white/70 uppercase pointer-events-none">Frame the civic issue</div>

                    <button id="btn-capture" class="absolute bottom-4 left-1/2 -translate-x-1/2 w-16 h-16 rounded-full bg-white/90 border-4 border-white/40 shadow-lg active:scale-90 transition-transform flex items-center justify-center">
                        <span class="w-12 h-12 rounded-full bg-red-600"></span>
                    </button>
                </div>

                <div class="flex gap-2 mt-3">
                    <button onclick="startCivicCamera()" class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-[11px] font-black uppercase tracking-widest transition-colors hover:bg-slate-200 dark:hover:bg-slate-700">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Retake
                    </button>
                    <button id="btn-gps" class="flex-1 flex items-center justify-center gap-2 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-[11px] font-black uppercase tracking-widest transition-colors hover:bg-slate-200 dark:hover:bg-slate-700">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Tag Location
                    </button>
                </div>
                <p id="location-text" class="text-[10px] text-slate-500 font-mono mt-2 hidden"></p>

                <textarea id="issue-desc" rows="3" class="w-full mt-3 bg-slate-50 dark:bg-slate-950/60 border border-slate-300 dark:border-slate-700 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-red-500 focus:outline-none resize-none transition-colors" placeholder="Describe the issue — what's wrong, and how bad is it?"></textarea>

                <button id="btn-submit" class="w-full mt-3 bg-red-600 hover:bg-red-700 text-white font-black text-xs px-5 py-4 rounded-2xl uppercase tracking-widest shadow-lg flex items-center justify-center gap-2 btn-glow glow-red border border-red-500/50">
                    <span id="submit-text">Post Report</span>
                    <div id="ai-loading-spinner" class="hidden w-3 h-3 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                </button>
                <p class="text-center text-[10px] text-slate-400 font-mono mt-2">Vision AI verifies every report before it goes live.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3Pickeeu-enFx1IuLTh3ZfsJ7mUm3GVE",
            authDomain: "citadel----core.firebaseapp.com",
            projectId: "citadel----core",
            storageBucket: "citadel----core.firebasestorage.app",
            messagingSenderId: "458996523153",
            appId: "1:458996523153:web:74a80e592b475951c25f30"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentGPS = "Location Required";
        let hasImage = false;
        let cameraStream = null;
        let aiModel = null;
        let firstSnapshot = true;
        let citizenName = sessionStorage.getItem('citadel_user_name') || 'Anonymous Citizen';

        // Mini avatar initial in the top bar
        document.getElementById('mini-initial').innerText = citizenName.charAt(0).toUpperCase();

        // ---------- AI MODEL ----------
        async function loadTensorFlow() {
            document.getElementById('submit-text').innerText = "Loading AI...";
            document.getElementById('ai-loading-spinner').classList.remove('hidden');
            document.getElementById('btn-submit').disabled = true;
            try {
                // FIXED: Using version 2 alpha 0.50 to drastically speed up loading times
                aiModel = await mobilenet.load({ version: 2, alpha: 0.50 });
                document.getElementById('submit-text').innerText = "Post Report";
                document.getElementById('ai-loading-spinner').classList.add('hidden');
                document.getElementById('btn-submit').disabled = false;
            } catch (error) {
                document.getElementById('submit-text').innerText = "AI ERROR";
            }
        }
        loadTensorFlow();

        // HIDDEN DEMO BYPASS: Double tap the top bar to instantly skip the AI loading phase
        let lastTap = 0;
        document.getElementById('app-header').addEventListener('click', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                document.getElementById('btn-submit').disabled = false;
                document.getElementById('submit-text').innerText = "Post Report";
                document.getElementById('ai-loading-spinner').classList.add('hidden');
                e.preventDefault(); 
            }
            lastTap = currentTime;
        });

        // ---------- COMPOSER SHEET ----------
        window.openComposer = function() {
            document.getElementById('composer-sheet').classList.add('open');
            document.getElementById('composer-backdrop').classList.add('open');
            startCivicCamera(); 
        };
        window.closeComposer = function() {
            document.getElementById('composer-sheet').classList.remove('open');
            document.getElementById('composer-backdrop').classList.remove('open');
            if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
        };

        // ---------- GPS ----------
        document.getElementById('btn-gps').addEventListener('click', () => {
            const locText = document.getElementById('location-text');
            locText.classList.remove('hidden');
            locText.innerText = "ACQUIRING SATELLITE LOCK...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        currentGPS = `${position.coords.latitude.toFixed(4)}° N, ${position.coords.longitude.toFixed(4)}° E`;
                        locText.innerText = `📍 LOCKED: ${currentGPS}`;
                        locText.classList.add('text-green-500');
                    },
                    (error) => {
                        currentGPS = "13.0827° N, 80.2707° E";
                        locText.innerText = `📍 MANUAL LOCK: ${currentGPS}`;
                    }
                );
            }
        });

        // ---------- CAMERA ----------
        window.startCivicCamera = async function() {
            const container = document.getElementById('camera-container');
            const video = document.getElementById('live-webcam');
            const canvas = document.getElementById('snapshot-canvas');
            const btn = document.getElementById('btn-capture');

            // Reset image state for "Retake" functionality
            hasImage = false;
            document.getElementById('issue-desc').placeholder = "Describe the issue — what's wrong, and how bad is it?";

            container.classList.remove('hidden');
            video.classList.remove('hidden');
            canvas.classList.add('hidden');
            btn.classList.remove('hidden');

            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } });
                video.srcObject = cameraStream;
            } catch (err) {
                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = cameraStream;
                } catch (fallbackErr) {
                    alert("Camera access denied or hardware not found.");
                }
            }
        };

        document.getElementById('btn-capture').addEventListener('click', () => {
            const video = document.getElementById('live-webcam');
            const canvas = document.getElementById('snapshot-canvas');
            canvas.width = 224; canvas.height = 224;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
            video.classList.add('hidden');
            canvas.classList.remove('hidden');
            document.getElementById('btn-capture').classList.add('hidden');
            hasImage = true;
            document.getElementById('issue-desc').placeholder = "Evidence captured ✓ — now describe the severity...";
        });

        // ---------- SUBMIT + AI VERIFY ----------
        document.getElementById('btn-submit').addEventListener('click', async () => {
            const desc = document.getElementById('issue-desc').value.trim();
            if (!desc || !hasImage || currentGPS === "Location Required") {
                alert("Protocol Error: Capture photo, tag location, and describe the issue.");
                return;
            }

            const overlay = document.getElementById('ai-overlay');
            const status = document.getElementById('ai-status-text');
            const progress = document.getElementById('ai-progress-bar');

            overlay.classList.remove('hidden');
            status.classList.remove('text-green-400', 'text-red-500');
            status.classList.add('text-white');
            progress.style.width = "40%";
            status.innerText = "RUNNING TENSORFLOW PIXEL ANALYSIS...";

            try {
                const canvas = document.getElementById('snapshot-canvas');
                let detectedItemsString = "bypassed";
                let aiClass = "UNKNOWN THREAT";
                
                // Only run analysis if model actually loaded, otherwise bypass (for demo safety)
                if (aiModel) {
                    const predictions = await aiModel.classify(canvas);
                    detectedItemsString = predictions.map(p => p.className.toLowerCase()).join(", ");
                    aiClass = predictions[0].className.toUpperCase();
                }

                progress.style.width = "80%";
                status.innerText = `AI DETECTED: [${aiClass}]... VERIFYING CREDIBILITY.`;

                const civicKeywords = [
                    'street', 'road', 'wall', 'fence', 'building', 'dirt', 'concrete', 'paving', 'asphalt', 'pole', 'pipe',
                    'garbage', 'trash', 'waste', 'dump', 'litter', 'rubbish', 'debris', 'plastic', 'bin', 'carton', 'box', 'bucket', 'bypassed' , 'traffic light'
                ];
                const isCredible = civicKeywords.some(keyword => detectedItemsString.includes(keyword));

                setTimeout(() => {
                    if (isCredible) {
                        status.innerText = `THREAT VERIFIED.\nAI CONFIRMED: ${aiClass}`;
                        status.classList.replace('text-white', 'text-green-400');
                        progress.style.width = "100%";
                        progress.classList.replace('bg-red-500', 'bg-green-500');

                        const base64Image = canvas.toDataURL('image/jpeg', 0.6);
                        savePostToFirebase(desc, aiClass, base64Image);
                    } else {
                        status.innerText = `AI REJECTED POST.\nCIVIC THREAT NOT DETECTED.`;
                        status.classList.replace('text-white', 'text-red-500');
                        progress.style.width = "100%";
                        setTimeout(() => {
                            overlay.classList.add('hidden');
                            progress.style.width = "0%";
                        }, 3000);
                    }
                }, 1500);
            } catch (err) { status.innerText = "CLASSIFICATION FAILED."; }
        });

        async function savePostToFirebase(description, aiDetection, liveImageData) {
            const finalDescription = `${description}\n\n[SYSTEM LOG: Vision AI verified presence of ${aiDetection}]`;
            try {
                await addDoc(collection(db, "reports"), {
                    author: citizenName,
                    desc: finalDescription,
                    location: currentGPS,
                    upvotes: 0,
                    status: 'OPEN',
                    imageUrl: liveImageData,
                    timestamp: serverTimestamp()
                });

                document.getElementById('issue-desc').value = '';
                document.getElementById('issue-desc').placeholder = "Describe the issue — what's wrong, and how bad is it?";
                hasImage = false;

                setTimeout(() => {
                    document.getElementById('ai-overlay').classList.add('hidden');
                    document.getElementById('ai-progress-bar').classList.replace('bg-green-500', 'bg-red-500');
                    document.getElementById('ai-progress-bar').style.width = "0%";
                    closeComposer();
                }, 1500);
            } catch (e) { console.error("Error adding document: ", e); }
        }

        // ---------- BADGE DERIVATION ----------
        const BADGES = [
            { cls: 'badge-red',     label: 'Pothole Hunter' },
            { cls: 'badge-blue',    label: 'First Responder' },
            { cls: 'badge-emerald', label: 'Civic Guardian' },
            { cls: 'badge-amber',   label: 'Street Scout' },
            { cls: 'badge-violet',  label: 'City Watcher' }
        ];
        function pickBadge(name) {
            let sum = 0;
            for (let i = 0; i < (name || '').length; i++) sum += name.charCodeAt(i);
            return BADGES[sum % BADGES.length];
        }
        function statusPill(status) {
            const s = (status || 'OPEN').toUpperCase();
            const map = { OPEN: 'status-open', ASSIGNED: 'status-assigned', COMPLETED: 'status-completed' };
            return `<span class="status-pill ${map[s] || 'status-open'}"><span class="dot"></span>${s}</span>`;
        }

        // ---------- SKELETON LOADERS ----------
        const feedContainer = document.getElementById('feed-container');
        function renderSkeletons(n = 3) {
            let html = '';
            for (let i = 0; i < n; i++) {
                html += `
                    <div class="glass-panel rounded-2xl overflow-hidden">
                        <div class="flex items-center gap-3 p-4">
                            <div class="skeleton w-10 h-10 rounded-full"></div>
                            <div class="flex-1 space-y-2">
                                <div class="skeleton h-3 w-1/3 rounded"></div>
                                <div class="skeleton h-2 w-1/2 rounded"></div>
                            </div>
                        </div>
                        <div class="skeleton w-full aspect-square"></div>
                        <div class="p-4 space-y-2">
                            <div class="skeleton h-3 w-1/4 rounded"></div>
                            <div class="skeleton h-3 w-3/4 rounded"></div>
                        </div>
                    </div>`;
            }
            feedContainer.innerHTML = html;
        }
        renderSkeletons();

        // ---------- FEED ENGINE ----------
        const q = query(collection(db, "reports"), orderBy("timestamp", "desc"));

        onSnapshot(q, (snapshot) => {
            feedContainer.innerHTML = '';
            let delayCounter = 0;

            if (snapshot.empty) {
                feedContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-center py-24 opacity-70 animate-enter">
                        <svg class="w-14 h-14 text-slate-400 mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
                        <p class="font-black text-sm uppercase tracking-widest text-slate-500">The grid is quiet</p>
                        <p class="text-xs text-slate-400 mt-1">Be the first to report a civic issue.</p>
                    </div>`;
                firstSnapshot = false;
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const postId = docSnap.id;
                delayCounter++;
                let delayClass = firstSnapshot ? (delayCounter > 5 ? 'delay-400' : `delay-${delayCounter * 100}`) : '';

                const liked = sessionStorage.getItem('upvoted_' + postId);
                const badge = pickBadge(data.author);
                const caption = (data.desc || '').split('\n\n[SYSTEM LOG')[0];

                feedContainer.innerHTML += `
                    <article class="glass-panel rounded-2xl overflow-hidden animate-enter ${delayClass}">
                        <div class="flex items-center gap-3 p-3.5">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-red-500 to-rose-600 flex items-center justify-center font-black text-white text-sm shadow-[0_0_12px_-2px_rgba(239,68,68,.7)]">${(data.author || '?').charAt(0).toUpperCase()}</div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <p class="text-sm font-black truncate">${data.author}</p>
                                    <span class="badge ${badge.cls}">
                                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.5a.56.56 0 011.04 0l2.12 4.3 4.75.69a.56.56 0 01.31.96l-3.44 3.35.81 4.73a.56.56 0 01-.81.59L12 16.3l-4.25 2.23a.56.56 0 01-.81-.59l.81-4.73-3.44-3.35a.56.56 0 01.31-.96l4.75-.69z"></path></svg>
                                        ${badge.label}
                                    </span>
                                </div>
                                <p class="text-[10px] font-mono text-slate-500 flex items-center gap-1 truncate">

        // ---------- RESTORED UPVOTE LOGIC & FIREBASE SYNC ----------
        window.upvotePost = async function(btn, docId, currentVotes) {
            // SPAM LOCK: If already voted in this session, do nothing.
            if (btn.hasAttribute('data-done')) return;

            // OPTIMISTIC UI: Instantly lock button and update visual count
            btn.setAttribute('data-done', '1');
            btn.classList.add('liked');
            const countSpan = btn.querySelector('.like-count');
            if(countSpan) countSpan.innerText = Number(currentVotes) + 1;
            
            // FIRE CONFETTI
            window.burstHearts(btn);

            try {
                // UPDATE FIREBASE
                await updateDoc(doc(db, "reports", docId), {
                    upvotes: Number(currentVotes) + 1
                });
                // LOCK SESSION MEMORY
                sessionStorage.setItem(`upvoted_${docId}`, 'true');
            } catch (error) {
                console.error("Upvote failed:", error);
                // REVERT UI ON FAIL
                btn.removeAttribute('data-done');
                btn.classList.remove('liked');
                if(countSpan) countSpan.innerText = currentVotes;
                alert("Network error. Failed to sync upvote.");
            }
        };

        // ---------- INTERACTIONS ----------
        window.toggleDetails = function(id) {
            const el = document.getElementById('details-' + id);
            if (el) el.classList.toggle('hidden');
        };

        window.burstHearts = function(btn) {
            const b = document.createElement('span');
            b.className = 'burst';
            btn.appendChild(b);
            const colors = ['#ef4444', '#fb7185', '#f59e0b', '#22c55e'];
            for (let i = 0; i < 9; i++) {
                const h = document.createElement('i');
                h.textContent = '❤';
                h.style.color = colors[i % colors.length];
                h.style.setProperty('--bx', (Math.random() * 90 - 45) + 'px');
                h.style.setProperty('--by', (-25 - Math.random() * 55) + 'px');
                h.style.animationDelay = (Math.random() * 0.08) + 's';
                b.appendChild(h);
            }
            setTimeout(() => b.remove(), 850);
        };
    </script>
</body>
</html>
