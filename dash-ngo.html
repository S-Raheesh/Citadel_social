<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CITADEL | NGO Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans min-h-screen flex flex-col">

    <!-- Top Navigation -->
    <header class="glass-panel border-b border-slate-200 dark:border-slate-800 p-4 flex justify-between items-center shadow-md sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-emerald-500 text-white rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.5)]">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </div>
            <h1 class="text-xl font-black tracking-widest text-slate-900 dark:text-white uppercase drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]">NGO Command</h1>
            <span class="text-[10px] bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-400 font-mono px-2 py-0.5 rounded border border-emerald-200 dark:border-emerald-800 shadow-[0_0_10px_rgba(16,185,129,0.2)]">ADMIN ACCESS</span>
        </div>
        <a href="index.html" class="px-4 py-2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-[10px] font-black uppercase tracking-widest rounded transition-all btn-glow shadow-md">Sign Out</a>
    </header>

    <main class="flex-1 p-6 overflow-y-auto max-w-7xl w-full mx-auto space-y-10">
       
        <!-- DASHBOARD STATS -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-panel p-6 rounded-2xl flex items-center justify-between border-l-4 border-l-emerald-500">
                <div>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Active Volunteers</p>
                    <p class="text-3xl font-black text-slate-900 dark:text-white">124</p>
                </div>
            </div>
            <div class="glass-panel p-6 rounded-2xl flex items-center justify-between border-l-4 border-l-blue-500">
                <div>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Pending Applications</p>
                    <p id="pending-count" class="text-3xl font-black text-slate-900 dark:text-white">0</p>
                </div>
            </div>
        </div>

        <!-- PENDING VOLUNTEER REQUESTS -->
        <div>
            <div class="border-b border-slate-300 dark:border-slate-800 pb-2 mb-6 mt-10">
                <h2 class="text-2xl font-black uppercase tracking-tight drop-shadow-sm">Volunteer Intake</h2>
                <p class="text-xs text-slate-500 font-mono mt-1">Review and approve citizens requesting to join campaigns.</p>
            </div>
           
            <!-- THE DYNAMIC GRID: Firebase will inject cards right here -->
            <div id="request-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full py-10 text-slate-400 text-sm font-mono text-center animate-pulse">SYNCING INTAKE QUEUE...</div>
            </div>
        </div>

    </main>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyB3Pickeeu-enFx1IuLTh3ZfsJ7mUm3GVE",
            authDomain: "citadel----core.firebaseapp.com",
            projectId: "citadel----core",
            storageBucket: "citadel----core.firebasestorage.app",
            messagingSenderId: "458996523153",
            appId: "1:458996523153:web:74a80e592b475951c25f30"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const requestGrid = document.getElementById('request-grid');
        const pendingCounter = document.getElementById('pending-count');

        // Real-time listener: Only grabs requests marked "PENDING"
        onSnapshot(query(collection(db, "volunteer_requests"), where("status", "==", "PENDING")), (snapshot) => {
            requestGrid.innerHTML = '';
            let count = 0;

            snapshot.forEach((docSnap) => {
                count++;
                const req = docSnap.data();
               
                // Get first two letters of name for the avatar bubble
                const initials = req.citizenName ? req.citizenName.substring(0, 2).toUpperCase() : 'CT';
               
                requestGrid.innerHTML += `
                    <div id="req-card-${docSnap.id}" class="glass-panel rounded-xl p-5 shadow-lg border border-slate-200 dark:border-slate-800 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-slate-200 dark:bg-slate-800 rounded-full flex items-center justify-center font-black text-slate-500">${initials}</div>
                                    <div>
                                        <h3 class="font-bold text-sm">${req.citizenName}</h3>
                                        <p class="text-[10px] text-slate-500 font-mono">Verified Citizen</p>
                                    </div>
                                </div>
                                <span class="text-[9px] bg-amber-100 dark:bg-amber-900/30 text-amber-600 font-black px-2 py-1 rounded uppercase">Pending</span>
                            </div>
                            <p class="text-xs text-slate-600 dark:text-slate-400 mb-4 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-lg border border-slate-100 dark:border-slate-800">
                                Requested to join: <span class="font-bold text-emerald-600 dark:text-emerald-400">${req.ngoName}</span>
                            </p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.resolveRequest('${docSnap.id}', 'APPROVED')" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-black text-[10px] py-2.5 rounded uppercase tracking-widest transition-all btn-glow glow-emerald">Approve</button>
                            <button onclick="window.resolveRequest('${docSnap.id}', 'DENIED')" class="flex-1 bg-slate-200 dark:bg-slate-800 hover:bg-red-500 hover:text-white text-slate-600 dark:text-slate-400 font-black text-[10px] py-2.5 rounded uppercase tracking-widest transition-all">Deny</button>
                        </div>
                    </div>`;
            });

            // Update the counter at the top of the page
            if (pendingCounter) pendingCounter.innerText = count;
           
            // Show a message if there are no requests
            if (count === 0) {
                requestGrid.innerHTML = `<div class="col-span-full py-10 text-slate-400 text-sm font-mono text-center border border-dashed border-slate-700 rounded-xl">NO PENDING VOLUNTEER REQUESTS IN QUEUE.</div>`;
            }
        });

        // The function that runs when Approve or Deny is clicked
        // We attach it to "window" so the HTML buttons can see it from inside the Module script
        window.resolveRequest = async function(docId, newStatus) {
            const card = document.getElementById(`req-card-${docId}`);
           
            // Disable buttons immediately so they can't double-click
            if(card) {
                const buttons = card.querySelectorAll('button');
                buttons.forEach(btn => btn.disabled = true);
                if (newStatus === 'APPROVED') {
                    buttons[0].innerHTML = '<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin mx-auto"></div>';
                }
            }
           
            try {
                // Update the document in Firebase
                await updateDoc(doc(db, "volunteer_requests", docId), { status: newStatus });
                // Note: The UI will automatically remove the card instantly because it no longer matches "status == PENDING"
            } catch (error) {
                console.error("Error updating document: ", error);
                alert("Failed to sync status with Citadel Core.");
            }
        };
    </script>
</body>
</html>
